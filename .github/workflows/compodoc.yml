name: Deploy Compodoc

on:
  push:
    branches:
      - main # Chạy khi có code merge vào nhánh main
  workflow_dispatch: # Cho phép trigger bằng tay từ Github Actions

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Build Compodoc
        run: npm run compodoc:build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./documentation # Thư mục Compodoc sinh ra
          publish_branch: gh-pages # Deploy sang nhánh này để làm hosting
