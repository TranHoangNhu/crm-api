# Nginx Configuration for crm-api (NestJS)
# File: /etc/nginx/sites-available/crm-api
# Enable: ln -s /etc/nginx/sites-available/crm-api /etc/nginx/sites-enabled/crm-api
# Test:   nginx -t
# Reload: systemctl reload nginx

server {
    listen 80;
    server_name api.tranhoangnhu.website;

    # Redirect HTTP → HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Forward real IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (PDF generation can be slow)
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffer
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
    }
}

